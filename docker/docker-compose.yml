# inference-benchmarks compose services
#
# dev     — CPU-only, for Mac/CI development (runs anywhere)
# runtime — GPU-enabled, for benchmark runs on Thor (requires nvidia runtime)
#
# Usage:
#   docker compose run dev     bazel run //ci:lint
#   docker compose run runtime bazel run //benchmark:run

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/workspace
    working_dir: /workspace

  runtime:
    image: ghcr.io/saiprakash-c/inference-benchmarks:latest
    runtime: nvidia
    volumes:
      - ..:/workspace
    working_dir: /workspace
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
