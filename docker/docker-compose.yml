name: inference-benchmarks

# inference-benchmarks compose services
#
# dev     — CPU-only, for Mac/CI development (runs anywhere)
# runtime — GPU-enabled, for benchmark runs on Thor (requires nvidia runtime)
#
# Usage:
#   docker compose run dev     bazel run //ci:lint
#   docker compose run runtime bazel run //benchmark:run

services:
  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    volumes:
      - ..:/workspace
      - ~/.ssh:/home/saip/.ssh:ro
      - ~/.claude:/home/saip/.claude
      - ~/.gitconfig:/home/saip/.gitconfig:ro
      - ~/.config/gh:/home/saip/.config/gh:ro
      - ~/.bash_history:/home/saip/.bash_history
    working_dir: /workspace
    hostname: inference-benchmarks-dev
    network_mode: host
    environment:
      - TERM=xterm-256color
      - ANTHROPIC_API_KEY

  runtime:
    image: ghcr.io/saiprakash-c/inference-benchmarks:latest
    runtime: nvidia
    volumes:
      - ..:/workspace
      - ~/.ssh:/home/saip/.ssh:ro
      - ~/.claude:/home/saip/.claude
      - ~/.gitconfig:/home/saip/.gitconfig:ro
      - ~/.config/gh:/home/saip/.config/gh:ro
      - ~/.bash_history:/home/saip/.bash_history
    working_dir: /workspace
    hostname: inference-benchmarks-rt
    network_mode: host
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - TERM=xterm-256color
