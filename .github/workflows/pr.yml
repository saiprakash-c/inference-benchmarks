name: PR Checks

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  packages: read

jobs:
  build-dev:
    name: Build dev image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build dev image
        run: docker compose -f docker/docker-compose.yml build dev

  lint:
    name: Mechanical lint (//ci:lint)
    runs-on: ubuntu-latest
    needs: [build-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Run //ci:lint
        run: |
          docker compose -f docker/docker-compose.yml run --rm \
            --entrypoint python3 dev ci/lint.py

  validate-results:
    name: Validate new result files
    runs-on: ubuntu-latest
    needs: [build-dev]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find new result files
        id: new_results
        run: |
          NEW=$(git diff --name-only origin/main...HEAD -- 'results/*.json' | tr '\n' ' ')
          echo "files=${NEW}" >> $GITHUB_OUTPUT

      - name: Validate new results
        if: steps.new_results.outputs.files != ''
        run: |
          for f in ${{ steps.new_results.outputs.files }}; do
            docker compose -f docker/docker-compose.yml run --rm \
              --entrypoint python3 dev tools/validate_results.py "$f"
          done

  dockerfile-lint:
    name: Dockerfile lint (hadolint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: docker/Dockerfile.dev

  python-lint:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    needs: [build-dev]
    steps:
      - uses: actions/checkout@v4

      - name: Run ruff
        run: |
          docker compose -f docker/docker-compose.yml run --rm \
            -e RUFF_CACHE_DIR=/tmp/ruff_cache \
            --entrypoint ruff dev check .

  agent-doc-review:
    name: Agent doc review
    runs-on: ubuntu-latest
    needs: [lint]
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run doc review
        run: |
          docker compose -f docker/docker-compose.yml run --rm \
            --entrypoint python3 dev ci/doc_review.py
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
